# Render Blueprint for the Smart Notes API + database.
# Deploy with: Render Dashboard → New → Blueprint → point at this repo.
#
# This provisions the backend (Express/Socket.io) and a managed Postgres. The
# Next.js frontend is intended for Vercel, and file storage for Cloudflare R2;
# fill the `sync: false` vars (CLIENT_URL, S3_*, GOOGLE_CLIENT_ID, SMTP_*) in the
# Render dashboard after the R2 bucket and Vercel deployment exist.
#
# Note: Render's free Postgres and free web services sleep / expire — fine for a
# demo, upgrade the plans for anything long-lived.

databases:
  - name: smartnotes-db
    plan: free
    databaseName: smartnotes
    user: smartnotes

services:
  - type: web
    name: smartnotes-api
    runtime: docker
    plan: free
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: smartnotes-db
          property: connectionString
      # Your Vercel web origin(s), comma-separated. Required for CORS + cookies.
      - key: CLIENT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "7"
      - key: MAX_FILE_SIZE_MB
        value: "15"
      # --- Object storage (Cloudflare R2) ---
      - key: STORAGE_DRIVER
        value: s3
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_URL
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "false"
      # --- Optional integrations ---
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
